services:
  - type: web
    name: ai-secure-data-intelligence-platform-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TIMEOUT
        value: 20
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
